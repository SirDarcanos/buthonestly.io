name: Publish scheduled essays

# Rebuilds only when a scheduled essay has come due but is still 404, so builds
# stay rare while going live within the hour. See scripts/publish-scheduled.mjs.

on:
  schedule:
    - cron: "5 * * * *" # hourly, a few minutes past the hour
  workflow_dispatch: {}

concurrency:
  group: publish-scheduled
  cancel-in-progress: false

jobs:
  publish-due:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Rebuild if a scheduled essay is due
        env:
          CF_DEPLOY_HOOK_URL: ${{ secrets.CF_DEPLOY_HOOK_URL }}
          SITE_URL: ${{ vars.NEWSLETTER_SITE_URL || 'https://buthonestly.io' }}
        run: node scripts/publish-scheduled.mjs
