name: Publish scheduled essays

# Future-dated essays are committed ahead of time and only render in a build
# that runs on/after their date. This checks hourly and rebuilds ONLY when an
# essay has come due but is still 404 — so builds stay rare (not a daily churn)
# while scheduled essays go live within the hour of their timestamp. See
# scripts/publish-scheduled.mjs. The newsletter cron (13:00 UTC) then emails it.

on:
  schedule:
    - cron: "5 * * * *" # hourly, a few minutes past the hour
  workflow_dispatch: {}

concurrency:
  group: publish-scheduled
  cancel-in-progress: false

jobs:
  publish-due:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Rebuild if a scheduled essay is due
        env:
          CF_DEPLOY_HOOK_URL: ${{ secrets.CF_DEPLOY_HOOK_URL }}
          SITE_URL: ${{ vars.NEWSLETTER_SITE_URL || 'https://buthonestly.io' }}
        run: node scripts/publish-scheduled.mjs
