name: Notify subscribers on publish

# Emails subscribers when an essay goes live. Daily as well as on push, so
# future-dated essays go out when their date passes. The ledger
# (data/newsletter-sent.json) makes each essay email at most once.

on:
  push:
    branches: [main]
    paths:
      - "src/content/essays/**"
  schedule:
    - cron: "0 13 * * *" # daily 13:00 UTC — catches scheduled essays going live
  workflow_dispatch:
    inputs:
      send:
        description: "Actually send (true) or create drafts to review (false)"
        type: boolean
        default: false
      mode:
        description: "run or seed"
        type: string
        default: "run"
      test_slug:
        description: "Draft ONE essay by slug (ignores + never writes the ledger, never sends). Blank for normal runs."
        type: string
        default: ""

concurrency:
  group: newsletter
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the ledger commit can rebase + push

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Notify subscribers
        run: node scripts/notify-subscribers.mjs
        env:
          KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
          # push & cron send for real; manual dispatch defaults to drafts.
          KIT_SEND: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.send) || 'true' }}
          MODE: ${{ github.event.inputs.mode || 'run' }}
          # Set the NEWSLETTER_SITE_URL variable to override the domain.
          SITE_URL: ${{ vars.NEWSLETTER_SITE_URL || 'https://buthonestly.io' }}
          # Blank on push/cron; set only via the dispatch UI to draft one essay.
          TEST_SLUG: ${{ github.event.inputs.test_slug }}

      - name: Record sends
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/newsletter-sent.json
          if git diff --staged --quiet; then
            echo "Ledger unchanged."
          else
            git commit -m "chore: record newsletter sends [skip ci]"
            git pull --rebase origin main
            git push
          fi
