name: Rebuild related posts

# Regenerates semantic "related posts" (embeddings → neighbour map) whenever an
# essay changes, then commits data/embeddings.json + data/related.json. The
# heavy model (onnxruntime-node, ~200MB) is installed ad-hoc here, so it never
# touches the Cloudflare deploy install. The commit (no [skip ci]) triggers a
# normal Pages rebuild that ships the refreshed map.

on:
  push:
    branches: [main]
    paths:
      - "src/content/essays/**"
  # Daily, so the map picks up essays that go live by their scheduled date
  # (a date passing isn't a push). Only commits when the map actually changes.
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: related
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  related:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Model lives only on the runner, never in package.json / the deploy.
      - run: npm install --no-save @huggingface/transformers

      - run: npm run related

      - name: Commit refreshed map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/embeddings.json data/related.json
          if git diff --staged --quiet; then
            echo "Related map unchanged."
          else
            git commit -m "chore: rebuild related posts"
            git pull --rebase origin main
            git push
          fi
