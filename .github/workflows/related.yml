name: Rebuild related posts

# Regenerates the semantic related-posts map and commits it, which triggers a
# Pages rebuild. The model (onnxruntime-node, ~200MB) is installed ad-hoc so it
# never touches the Cloudflare deploy install.

on:
  push:
    branches: [main]
    paths:
      - "src/content/essays/**"
  # A date passing isn't a push, so scheduled essays need the cron.
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: related
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  related:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm install --no-save @huggingface/transformers

      - run: npm run related

      - name: Commit refreshed map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/embeddings.json data/related.json
          if git diff --staged --quiet; then
            echo "Related map unchanged."
          else
            git commit -m "chore: rebuild related posts"
            git pull --rebase origin main
            git push
          fi
